<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Adi Wallpapers 🔥</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white;}
#gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;padding:10px;}
img{width:100%;border-radius:10px;}
button{padding:8px;border:none;border-radius:5px;margin:5px;}
#viewer{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:black;justify-content:center;align-items:center;flex-direction:column;}
</style>

</head>

<body>

<h2 style="text-align:center;">🔥 Adi Wallpapers</h2>

<input id="search" placeholder="Search..." style="width:90%;margin:10px auto;display:block;padding:10px;border-radius:10px;">

<button onclick="toggleMode()" style="position:fixed;top:10px;right:10px;">🌙</button>

<div id="gallery"></div>

<div id="viewer">
  
<img id="bigImg" style="max-width:100%;max-height:70%;">
<div id="info" style="margin:10px;"></div>

<button onclick="event.stopPropagation(); likeImg()">❤️ Like</button>

<button onclick="event.stopPropagation(); downloadImage()">Download</button>

<!-- 🔥 Instruction -->
<p style="text-align:center; font-size:14px; color:#ccc; margin-top:10px;">
📥 Download kaise kare:<br><br>
1️⃣ Download button dabao<br>
2️⃣ Image open hogi<br>
3️⃣ Image ko hold karo (long press)<br>
4️⃣ "Download image" pe click karo ✅
</p>

</div>

<script>
let username="aditya-codexhub";
let repo="Adi-x-codes";
let folder="images";
let allImages=[];

async function loadImages(){
let url=`https://api.github.com/repos/${username}/${repo}/contents/${folder}`;
let res=await fetch(url);
let data=await res.json();

let gallery=document.getElementById("gallery");
gallery.innerHTML="";
allImages=[];

data.forEach(file=>{
if(file.name.endsWith(".jpg")||file.name.endsWith(".png")){
allImages.push(file.download_url);

let div=document.createElement("div");
div.innerHTML=`<img src="${file.download_url}" onclick="openImg('${file.download_url}')">`;
gallery.appendChild(div);
}
});
}
loadImages();

document.getElementById("search").oninput=function(){
let val=this.value.toLowerCase();
let g=document.getElementById("gallery");
g.innerHTML="";
allImages.forEach(src=>{
if(src.toLowerCase().includes(val)){
let div=document.createElement("div");
div.innerHTML=`<img src="${src}" onclick="openImg('${src}')">`;
g.appendChild(div);
}
});
}

function openImg(src){
viewer.style.display="flex";
bigImg.src=src;

let l=localStorage.getItem(src+"_like")||0;
let d=localStorage.getItem(src+"_download")||0;
info.innerText="❤️ "+l+" | 📥 "+d;
}

viewer.onclick=function(e){
if(e.target.id==="viewer") viewer.style.display="none";
}

function likeImg(){
let src=bigImg.src;
let l=localStorage.getItem(src+"_like")||0;
l++;
localStorage.setItem(src+"_like",l);
alert("Liked: "+l);
}

// 🔥 Download FIX
function downloadImage(){
let url = bigImg.src;

let a = document.createElement("a");
a.href = url;
a.target = "_blank";
a.rel = "noopener";

document.body.appendChild(a);
a.click();
document.body.removeChild(a);

// counter
let d = localStorage.getItem(url+"_download")||0;
d++;
localStorage.setItem(url+"_download", d);
}

function toggleMode(){
document.body.classList.toggle("light");
}
</script>

</body>
</html>
